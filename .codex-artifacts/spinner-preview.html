<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spinner Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(125, 211, 252, 0.24), transparent 34%),
          linear-gradient(180deg, #edf4f8 0%, #f8fbfd 100%);
        color: #0f172a;
      }

      .card {
        width: min(780px, calc(100vw - 48px));
        border: 1px solid rgba(14, 116, 144, 0.18);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        padding: 20px;
        box-shadow: 0 18px 40px rgba(14, 44, 68, 0.1);
      }

      .card-label {
        margin: 0 0 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #0f766e;
      }

      .card-time {
        margin: 0;
        font-size: 14px;
        color: #475569;
      }

      .status {
        margin-top: 16px;
        border: 1px solid #bae6fd;
        border-radius: 18px;
        background: #ecfeff;
        padding: 14px 16px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .status-copy {
        min-width: 0;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status-title {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        color: #164e63;
      }

      .status-chip {
        border-radius: 999px;
        background: white;
        padding: 7px 10px;
        font-size: 14px;
        font-weight: 600;
        color: #155e75;
      }

      @keyframes stream-scan {
        0% {
          transform: translate3d(-0.75rem, 0, 0);
          opacity: 0;
        }

        18% {
          opacity: 0.48;
        }

        100% {
          transform: translate3d(3.35rem, 0, 0);
          opacity: 0;
        }
      }

      @keyframes analysis-bar {
        0%,
        100% {
          opacity: 0.52;
          transform: scaleY(0.62);
        }

        35% {
          opacity: 1;
          transform: scaleY(1);
        }

        70% {
          opacity: 0.82;
          transform: scaleY(0.78);
        }
      }

      .stream-activity-indicator {
        position: relative;
        width: 2.7rem;
        height: 2rem;
        flex-shrink: 0;
        overflow: hidden;
        border: 1px solid rgba(14, 116, 144, 0.18);
        border-radius: 0.75rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(234, 248, 252, 0.98) 100%);
      }

      .stream-activity-indicator::before {
        content: "";
        position: absolute;
        inset: 0.26rem 0.28rem;
        border-radius: 0.52rem;
        background:
          linear-gradient(180deg, rgba(8, 145, 178, 0.09) 0%, rgba(8, 145, 178, 0.03) 100%),
          repeating-linear-gradient(
            0deg,
            transparent 0,
            transparent 0.42rem,
            rgba(8, 145, 178, 0.05) 0.42rem,
            rgba(8, 145, 178, 0.05) 0.46rem
          ),
          repeating-linear-gradient(
            90deg,
            transparent 0,
            transparent 0.48rem,
            rgba(8, 145, 178, 0.07) 0.48rem,
            rgba(8, 145, 178, 0.07) 0.54rem
          );
      }

      .stream-activity-indicator__baseline,
      .stream-activity-indicator__bar,
      .stream-activity-indicator__scan {
        position: absolute;
      }

      .stream-activity-indicator__baseline {
        left: 0.48rem;
        right: 0.42rem;
        bottom: 0.44rem;
        height: 1px;
        background: linear-gradient(90deg, rgba(15, 118, 110, 0.2) 0%, rgba(8, 145, 178, 0.24) 100%);
      }

      .stream-activity-indicator__bar {
        bottom: 0.46rem;
        width: 0.22rem;
        border-radius: 999px 999px 0.16rem 0.16rem;
        background: linear-gradient(180deg, rgba(8, 145, 178, 0.95) 0%, rgba(14, 116, 144, 0.72) 100%);
        transform-origin: center bottom;
        animation: analysis-bar 1.16s cubic-bezier(0.22, 1, 0.36, 1) infinite;
        will-change: transform, opacity;
      }

      .stream-activity-indicator__bar-a {
        left: 0.58rem;
        height: 0.36rem;
      }

      .stream-activity-indicator__bar-b {
        left: 0.9rem;
        height: 0.72rem;
        animation-delay: 0.08s;
      }

      .stream-activity-indicator__bar-c {
        left: 1.22rem;
        height: 0.52rem;
        animation-delay: 0.16s;
      }

      .stream-activity-indicator__bar-d {
        left: 1.54rem;
        height: 0.92rem;
        animation-delay: 0.24s;
      }

      .stream-activity-indicator__bar-e {
        left: 1.86rem;
        height: 0.64rem;
        animation-delay: 0.32s;
      }

      .stream-activity-indicator__scan {
        top: 0.34rem;
        bottom: 0.34rem;
        width: 0.58rem;
        border-radius: 0.48rem;
        background: linear-gradient(90deg, rgba(125, 211, 252, 0) 0%, rgba(125, 211, 252, 0.16) 38%, rgba(125, 211, 252, 0.42) 50%, rgba(125, 211, 252, 0.16) 62%, rgba(125, 211, 252, 0) 100%);
        animation: stream-scan 1.24s cubic-bezier(0.22, 1, 0.36, 1) infinite;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <p class="card-label">Agent Response</p>
      <p class="card-time">Spinner preview</p>

      <section class="status">
        <div class="status-row">
          <div class="stream-activity-indicator" aria-hidden="true">
            <span class="stream-activity-indicator__baseline"></span>
            <span class="stream-activity-indicator__bar stream-activity-indicator__bar-a"></span>
            <span class="stream-activity-indicator__bar stream-activity-indicator__bar-b"></span>
            <span class="stream-activity-indicator__bar stream-activity-indicator__bar-c"></span>
            <span class="stream-activity-indicator__bar stream-activity-indicator__bar-d"></span>
            <span class="stream-activity-indicator__bar stream-activity-indicator__bar-e"></span>
            <span class="stream-activity-indicator__scan"></span>
          </div>

          <div class="status-copy">
            <p class="status-title">Running your analysis</p>
            <span class="status-chip">Querying governed warehouse...</span>
          </div>
        </div>
      </section>
    </article>
  </body>
</html>
